# render.yaml — BlindDeal Background Worker
# Deploy: https://render.com/deploy?repo=https://github.com/YOUR_USERNAME/blinddeal
#
# This runs the MCP Server + Telegram Bot as a single worker process.
# start-bot.ts spawns both as child processes with auto-restart.

services:
  - type: worker
    name: blinddeal-bot
    env: node
    region: oregon
    plan: free
    branch: main
    buildCommand: pnpm install --frozen-lockfile
    startCommand: npx tsx start-bot.ts all
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ARBITRUM_SEPOLIA_RPC_URL
        sync: false
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://blind-deal.vercel.app
      - key: VITE_TELEGRAM_BOT_USERNAME
        value: BlindDealBot
      - key: MCP_PORT
        value: "3001"
