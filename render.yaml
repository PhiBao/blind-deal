# render.yaml — BlindDeal Web Service
# Deploy: https://render.com/deploy?repo=https://github.com/YOUR_USERNAME/blinddeal
#
# Runs MCP Server + Telegram Bot as a single process.
# Web Service (free) — Render dropped free Background Workers.
# Health check + keepalive cron prevent 15-min idle spin-down.
#
# Free-tier alternatives for always-on: Fly.io (3 free VMs), Railway ($5/mo credit)

services:
  - type: web
    name: blinddeal-bot
    env: node
    region: oregon
    plan: free
    branch: main
    buildCommand: pnpm install --frozen-lockfile
    startCommand: npx tsx start-bot.ts all
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ARBITRUM_SEPOLIA_RPC_URL
        sync: false
      - key: SEPOLIA_RPC_URL
        sync: false
      - key: FRONTEND_URL
        value: https://blind-deal.vercel.app
      - key: MCP_PORT
        value: "3001"
